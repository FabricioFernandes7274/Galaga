<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Pedido Romântico</title>
    <link rel="stylesheet" href="pedido.css" />
</head>
<body class="neutral">
    <main class="stage">
        <section class="dialogue" aria-live="polite">
        </section>

        <article class="card">
            <div class="dialogue-footer">
                <button type="button" id="nextButton" class="button button-primary">Próxima fala</button>
            </div>
            <div class="dialogue-footer hidden" id="choiceButtons">
                <button type="button" id="yesButton" class="button button-primary">Sim</button>
                <button type="button" id="noButton" class="button button-secondary">Não</button>
            </div>
        </article>
    </main>

    <script src="pedido.js"></script>
</body>
</html>
